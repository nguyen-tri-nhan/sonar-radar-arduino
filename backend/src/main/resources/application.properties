quarkus.http.port=8080

# CORS — cho phép React dev server (localhost:3000) kết nối
quarkus.http.cors.origins=http://localhost:3000

# Serial port
radar.serial.port=/dev/cu.usbmodem11301
radar.serial.baud=9600
radar.poc.radar-id=r-01

# Heartbeat timeout (giây)
radar.heartbeat.timeout-seconds=5

# Log format dễ đọc hơn trên console
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{1.}] %s%e%n
quarkus.log.level=INFO
